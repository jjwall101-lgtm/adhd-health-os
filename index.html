<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sleep Score Engine V1</title>
<style>
:root{--bg:#f3eee7;--card:#fffaf4;--ink:#171412;--muted:#766b61;--accent:#4f7cac}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:14px}
.app{max-width:760px;margin:auto}
h1{font-size:1.7rem;margin:0}.sub{color:var(--muted);font-weight:700;margin:4px 0 12px}
.card{background:var(--card);border-radius:24px;padding:16px;margin:12px 0;box-shadow:0 8px 22px rgba(40,28,18,.06)}
.scoreBox{text-align:center;padding:18px;border-radius:24px;background:linear-gradient(135deg,#fffaf4,#d9e8f4)}
.score{font-size:4rem;font-weight:950;line-height:1}.rating{font-size:1.3rem;font-weight:900;margin-top:6px}
label{display:block;font-weight:850;color:var(--muted);margin-top:12px}
input,select{width:100%;padding:12px;border-radius:14px;border:1px solid #d8cbbf;margin-top:6px;font:inherit}
button{width:100%;border:0;border-radius:16px;background:var(--ink);color:white;font-weight:850;padding:13px;margin-top:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:white;border:1px solid #eadfd3;border-radius:18px;padding:12px;margin-bottom:8px}.stat b{display:block;font-size:1.2rem}
small{color:var(--muted);font-weight:700}.status{font-weight:900;color:#2e7d32;margin-top:10px}
</style>
</head>
<body>
<main class="app">
<h1>Sleep Score Engine V1</h1>
<p class="sub">Engine 2: sleep recovery calculation</p>

<section class="scoreBox">
<div class="score" id="sleepScore">75</div>
<div class="rating" id="rating">Good</div>
<small id="explanation">Enter sleep data to test the engine.</small>
</section>

<section class="card">
<h2>Sleep Inputs</h2>

<label>Sleep duration / hours
<input id="duration" type="number" step="0.1" value="8">
</label>

<label>Sleep quality / 10
<input id="quality" type="range" min="0" max="10" value="8">
<small>Quality: <span id="qualityVal">8</span>/10</small>
</label>

<label>Night wakings
<input id="wakings" type="number" min="0" step="1" value="1">
</label>

<div class="grid">
<label>Bedtime
<input id="bedtime" type="time">
</label>

<label>Wake time
<input id="waketime" type="time">
</label>
</div>

<button type="button" onclick="saveEntry()">Save Test Entry</button>
<div class="status" id="status"></div>
</section>

<section class="card">
<h2>Breakdown</h2>
<div class="grid">
<div class="stat"><b id="durationScore">50</b>Duration Score</div>
<div class="stat"><b id="qualityScore">32</b>Quality Score</div>
<div class="stat"><b id="wakingScore">8</b>Wakings Score</div>
<div class="stat"><b id="sleepDebt">0h</b>Sleep Debt</div>
</div>
<div class="stat"><b id="risk">LOW</b>Recovery Risk</div>
</section>

<section class="card">
<h2>Saved Entries</h2>
<div id="history"></div>
<button type="button" onclick="clearHistory()">Clear History</button>
</section>
</main>

<script>
let history = [];
try {
  history = JSON.parse(localStorage.getItem('sleepScoreEngineHistory') || '[]');
} catch(e) {
  history = [];
}

function getNumber(id, fallback){
  const n = Number(document.getElementById(id).value);
  return Number.isFinite(n) ? n : fallback;
}

function calculate(){
  const duration = getNumber('duration', 0);
  const quality = getNumber('quality', 0);
  const wakings = getNumber('wakings', 0);

  // Duration score out of 50.
  // 8 hours is ideal. Gradual penalty below/above ideal.
  let durScore;
  if(duration <= 0) durScore = 0;
  else if(duration <= 8) durScore = (duration / 8) * 50;
  else if(duration <= 9) durScore = 50;
  else durScore = Math.max(35, 50 - ((duration - 9) * 5));

  // Quality score out of 40.
  const qualScore = (quality / 10) * 40;

  // Wakings score out of 10.
  const wakeScore = Math.max(0, 10 - (wakings * 2));

  const score = Math.round(Math.max(0, Math.min(100, durScore + qualScore + wakeScore)));

  const debt = Math.max(0, 8 - duration);

  let rating = 'Severe';
  if(score >= 90) rating = 'Excellent';
  else if(score >= 75) rating = 'Good';
  else if(score >= 60) rating = 'Average';
  else if(score >= 40) rating = 'Poor';

  let risk = 'HIGH';
  if(score >= 75) risk = 'LOW';
  else if(score >= 60) risk = 'MEDIUM';

  document.getElementById('sleepScore').textContent = score;
  document.getElementById('rating').textContent = rating;
  document.getElementById('explanation').textContent = `Sleep Score ${score}/100 · ${rating}`;
  document.getElementById('durationScore').textContent = Math.round(durScore) + ' / 50';
  document.getElementById('qualityScore').textContent = Math.round(qualScore) + ' / 40';
  document.getElementById('wakingScore').textContent = Math.round(wakeScore) + ' / 10';
  document.getElementById('sleepDebt').textContent = debt.toFixed(1) + 'h';
  document.getElementById('risk').textContent = risk;

  return {
    score, rating, risk,
    duration, quality, wakings,
    durationScore: Math.round(durScore),
    qualityScore: Math.round(qualScore),
    wakingScore: Math.round(wakeScore),
    sleepDebt: Number(debt.toFixed(1)),
    bedtime: document.getElementById('bedtime').value,
    waketime: document.getElementById('waketime').value
  };
}

function saveEntry(){
  const result = calculate();
  history.push({
    date: new Date().toISOString(),
    ...result
  });
  localStorage.setItem('sleepScoreEngineHistory', JSON.stringify(history));
  document.getElementById('status').textContent = 'Saved.';
  renderHistory();
}

function renderHistory(){
  const box = document.getElementById('history');
  if(!history.length){
    box.innerHTML = '<small>No saved entries yet.</small>';
    return;
  }
  box.innerHTML = history.slice().reverse().map(h=>{
    const d = new Date(h.date).toLocaleString('en-GB');
    return `<div class="stat"><b>${h.score}/100 · ${h.rating}</b><small>${d}<br>${h.duration}h sleep · quality ${h.quality}/10 · ${h.wakings} wakings · debt ${h.sleepDebt}h</small></div>`;
  }).join('');
}

function clearHistory(){
  if(confirm('Clear sleep score history?')){
    history = [];
    localStorage.removeItem('sleepScoreEngineHistory');
    renderHistory();
  }
}

document.getElementById('duration').addEventListener('input', calculate);
document.getElementById('quality').addEventListener('input', function(){
  document.getElementById('qualityVal').textContent = this.value;
  calculate();
});
document.getElementById('wakings').addEventListener('input', calculate);
document.getElementById('bedtime').addEventListener('input', calculate);
document.getElementById('waketime').addEventListener('input', calculate);

calculate();
renderHistory();
</script>
</body>
</html>
